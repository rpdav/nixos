services:
  app:
    image: homeassistant/home-assistant
    network_mode: host
    volumes:
      - '/serviceOpts.dockerDir/Home-Assistant-Core/config:/config:rw'
    cap_add:
      - NET_ADMIN
    depends_on:
      db:
        condition: service_started
        restart: true
    restart: unless-stopped
  db:
    image: lscr.io/linuxserver/mariadb
    ports: 
      - 3306:3306
    networks:
      - default
    environment:
      TZ: config.time.timeZone
      # MYSQL_ROOT_PASSWORD: changeme # pulled from secret env file
      PUID: 1000
      PGID: 1000
    volumes:
      - '/config.serviceOpts.dockerDir/Home-Assistant-Core/db:/config:rw'
    restart: unless-stopped
  zwave:
    image: zwavejs/zwavejs2mqtt
    environment:
      ZWAVEJS_EXTERNAL_CONFIG: /usr/src/app/store/.config-db
    ports:
      - 3000:3000
    networks:
      - default
      - proxynet
    volumes:
      - '/config.serviceOpts.dockerDir/Home-Assistant-Core/zwave/data:/usr/src/app/store:rw'
      - '/config.serviceOpts.dockerDir/Home-Assistant-Core/zwave/log:/usr/src/app/bin:rw'
    devices:
      - '/dev/serial/by-id/usb-0658_0200-if00:/dev/zwave'
    restart: unless-stopped
    
networks:
  proxynet:
    external: true
